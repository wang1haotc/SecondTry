<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Y6 的长线选择</title>
  <style>
    :root {
      --bg: #080b12;
      --ink: #f8fafc;
      --muted: #c8d1df;
      --soft: rgba(8, 12, 22, 0.58);
      --glass: rgba(10, 15, 28, 0.42);
      --line: rgba(255, 255, 255, 0.18);
      --accent: #ffd166;
      --accent-2: #4ecdc4;
      --danger: #ff8f70;
      --shadow: 0 28px 90px rgba(0, 0, 0, 0.42);
    }

    * {
      box-sizing: border-box;
    }

    [hidden] {
      display: none !important;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", Arial, sans-serif;
      background: #080b12;
      overflow-x: hidden;
    }

    button {
      font: inherit;
    }

    .app {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 18px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.05), transparent 36%),
        #080b12;
    }

    .game {
      width: min(calc((100vh - 36px) * 16 / 9), calc(100vw - 36px), 1366px);
      aspect-ratio: 16 / 9;
      min-height: 0;
      height: auto;
      overflow: hidden;
      position: relative;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #111827;
      box-shadow: var(--shadow);
    }

    .scene-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      background: #111827;
    }

    .home-screen {
      position: absolute;
      inset: 0;
      z-index: 4;
      display: grid;
      place-items: center;
      padding: 28px;
      background: rgba(5, 9, 18, 0.28);
    }

    .home-panel {
      width: min(720px, 100%);
      padding: clamp(24px, 5vw, 44px);
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 8px;
      background: rgba(8, 13, 24, 0.42);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      text-align: center;
      backdrop-filter: blur(10px);
    }

    .home-title {
      margin: 0;
      color: #fff3c8;
      font-size: clamp(30px, 5vw, 54px);
      line-height: 1.08;
      letter-spacing: 0;
    }

    .home-description {
      margin: 18px auto 0;
      max-width: 620px;
      color: #eef4ff;
      font-size: clamp(15px, 1.55vw, 19px);
      line-height: 1.78;
    }

    .home-start {
      min-height: 46px;
      margin-top: 26px;
      padding: 0 24px;
      border: 0;
      border-radius: 8px;
      color: #101828;
      cursor: pointer;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      font-weight: 900;
    }

    .shade {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(5, 9, 18, 0.36) 0%, rgba(5, 9, 18, 0.06) 48%, rgba(5, 9, 18, 0.28) 100%),
        linear-gradient(0deg, rgba(5, 9, 18, 0.66) 0%, rgba(5, 9, 18, 0.06) 54%, rgba(5, 9, 18, 0.24) 100%);
      pointer-events: none;
    }

    .hud {
      position: absolute;
      inset: 18px 18px auto 18px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      z-index: 2;
      pointer-events: none;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(6, 10, 20, 0.28);
      backdrop-filter: blur(8px);
    }

    .mark {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      border-radius: 8px;
      color: #101828;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      font-weight: 900;
      letter-spacing: 0;
    }

    h1 {
      margin: 0;
      font-size: clamp(17px, 1.8vw, 24px);
      line-height: 1.1;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .round {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    .progress {
      width: 150px;
      height: 7px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.14);
    }

    .progress span {
      display: block;
      height: 100%;
      width: 0%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      transition: width 260ms ease;
    }

    .stats {
      width: min(340px, 34vw);
      max-height: min(52vh, 340px);
      overflow: auto;
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(6, 10, 20, 0.34);
      backdrop-filter: blur(10px);
      pointer-events: auto;
    }

    .stats-title {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
      color: #fff3c8;
      font-size: 12px;
      font-weight: 800;
    }

    .traits {
      display: grid;
      gap: 7px;
    }

    .trait {
      display: grid;
      grid-template-columns: 58px 1fr 24px;
      align-items: center;
      gap: 7px;
      color: var(--muted);
      font-size: 11px;
    }

    .trait-track {
      height: 7px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.16);
    }

    .trait-track span {
      display: block;
      height: 100%;
      width: 0%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent-2), var(--accent));
      transition: width 260ms ease;
    }

    .story {
      position: absolute;
      left: 32px;
      right: 32px;
      bottom: 24px;
      z-index: 2;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(290px, 0.44fr);
      gap: 12px;
      align-items: end;
    }

    .narrative,
    .choices {
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      background: var(--glass);
      box-shadow: 0 14px 44px rgba(0, 0, 0, 0.2);
      backdrop-filter: blur(8px);
    }

    .narrative {
      min-height: 178px;
      padding: 16px 18px 17px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.025)),
        rgba(6, 10, 20, 0.38);
    }

    .age-tag {
      display: inline-flex;
      margin-bottom: 8px;
      padding: 5px 9px;
      border-radius: 8px;
      color: #101828;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      font-size: 12px;
      font-weight: 900;
    }

    .story-title {
      margin: 0;
      color: #fff3c8;
      font-size: clamp(22px, 2.6vw, 34px);
      line-height: 1.12;
      letter-spacing: 0;
    }

    .description {
      max-width: 760px;
      margin: 10px 0 0;
      color: #edf3ff;
      font-size: clamp(14px, 1.25vw, 17px);
      line-height: 1.68;
    }

    .last-choice {
      margin-top: 9px;
      padding-left: 10px;
      border-left: 3px solid var(--accent-2);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .choices {
      display: grid;
      grid-template-columns: 1fr;
      gap: 7px;
      padding: 8px;
      background: rgba(6, 10, 20, 0.22);
    }

    .choice {
      display: grid;
      gap: 3px;
      min-height: 43px;
      padding: 8px 10px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 8px;
      color: var(--ink);
      text-align: left;
      cursor: pointer;
      background: rgba(9, 13, 24, 0.28);
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    .choice:hover,
    .choice:focus-visible {
      outline: none;
      transform: translateX(-2px);
      border-color: rgba(255, 209, 102, 0.82);
      background: rgba(255, 209, 102, 0.16);
    }

    .choice strong {
      color: #fff3c8;
      font-size: 13px;
      line-height: 1.25;
    }

    .choice span {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.35;
    }

    .ending-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .primary,
    .secondary {
      min-height: 42px;
      padding: 0 16px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 800;
    }

    .primary {
      border: 0;
      color: #101828;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
    }

    .secondary {
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: var(--ink);
      background: rgba(255, 255, 255, 0.1);
    }

    .tertiary {
      min-height: 42px;
      padding: 0 16px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      color: var(--ink);
      cursor: pointer;
      background: rgba(8, 13, 24, 0.34);
      font-weight: 800;
    }

    body.is-home .story {
      visibility: hidden;
    }

    .history {
      max-height: 180px;
      overflow: auto;
      margin-top: 14px;
      padding-right: 4px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.62;
    }

    .history div {
      padding: 7px 0;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .load-error {
      position: absolute;
      inset: 0;
      z-index: 5;
      display: none;
      place-items: center;
      padding: 28px;
      color: #fff;
      background: #111827;
      text-align: center;
      line-height: 1.7;
    }

    .load-error strong {
      color: var(--accent);
    }

    @media (max-width: 900px) {
      .app {
        padding: 0;
      }

      .game {
        width: min(100vw, calc(100vh * 16 / 9));
        height: auto;
        min-height: 0;
        aspect-ratio: 16 / 9;
        border-radius: 0;
        border: 0;
      }

      .scene-image {
        position: absolute;
      }

      .shade {
        position: absolute;
        background:
          linear-gradient(0deg, rgba(5, 9, 18, 0.78) 0%, rgba(5, 9, 18, 0.2) 58%, rgba(5, 9, 18, 0.46) 100%);
      }

      .hud {
        position: absolute;
        inset: 12px 12px auto 12px;
        flex-direction: column;
        padding: 0;
      }

      .brand,
      .stats {
        width: 100%;
      }

      .stats {
        order: 2;
      }

      .story {
        position: absolute;
        left: 12px;
        right: 12px;
        bottom: 12px;
        grid-template-columns: 1fr;
        padding: 0;
        margin-top: 0;
      }

      .story-title {
        font-size: clamp(18px, 5vw, 28px);
      }

      .description {
        font-size: clamp(12px, 3.2vw, 15px);
        line-height: 1.55;
      }

      .choice {
        min-height: 42px;
        padding: 7px 9px;
      }

      .choices {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 520px) {
      h1 {
        white-space: normal;
      }

      .round {
        flex-wrap: wrap;
      }

      .progress {
        width: 100%;
      }

      .narrative {
        min-height: auto;
        padding: 12px;
      }

      .trait {
        grid-template-columns: 48px 1fr 24px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="game" aria-label="Y6 的五十年文字冒险游戏">
      <img id="sceneImage" class="scene-image" alt="当前剧情画面">
      <div class="shade" aria-hidden="true"></div>

      <section id="homeScreen" class="home-screen" aria-label="游戏首页">
        <div class="home-panel">
          <h2 id="homeTitle" class="home-title"></h2>
          <p id="homeDescription" class="home-description"></p>
          <button id="startButton" class="home-start" type="button">开始游戏</button>
        </div>
      </section>

      <header class="hud">
        <div class="brand">
          <div class="mark" aria-hidden="true">Y6</div>
          <div>
            <h1 id="gameTitle">Y6 的长线选择</h1>
            <div class="round" aria-live="polite">
              <span id="roundLabel">第 1 / 13 轮</span>
              <div class="progress" aria-hidden="true"><span id="progressBar"></span></div>
            </div>
          </div>
        </div>

        <aside class="stats" aria-label="人物属性">
          <div class="stats-title">
            <span>人物属性</span>
            <span id="ageTag">0-8 岁</span>
          </div>
          <div class="traits" id="traits"></div>
        </aside>
      </header>

      <section class="story">
        <article class="narrative" aria-live="polite">
          <span id="agePill" class="age-tag">0-8 岁</span>
          <h2 id="storyTitle" class="story-title"></h2>
          <p id="description" class="description"></p>
          <div id="lastChoice" class="last-choice" hidden></div>
          <div id="history" class="history" hidden></div>
          <div id="endingActions" class="ending-actions" hidden>
            <button class="primary" id="restartButton" type="button">重新开始</button>
            <button class="tertiary" id="homeButton" type="button">回到首页</button>
            <button class="secondary" id="shareButton" type="button">复制人生摘要</button>
          </div>
        </article>

        <nav id="choices" class="choices" aria-label="玩家选项"></nav>
      </section>

      <div id="loadError" class="load-error">
        <p><strong>没有加载到场景数据。</strong><br>请确认 <code>scenes/scenes.js</code> 存在，并且页面可以读取这个文件。</p>
      </div>
    </section>
  </main>

  <script src="scenes/scenes.js"></script>
  <script>
    const data = window.Y6_SCENE_DATA;
    const loadError = document.getElementById("loadError");

    if (!data) {
      loadError.style.display = "grid";
      throw new Error("Missing scenes/scenes.js");
    }

    const traits = Object.fromEntries(Object.keys(data.traitLabels).map(key => [key, 0]));
    const maxTrait = data.maxTrait || 12;
    let screen = "home";
    let roundIndex = 0;
    let history = [];
    let finalEnding = null;
    let previousBranch = null;
    let currentScene = makeRoundScene(activeRound());

    const sceneImage = document.getElementById("sceneImage");
    const ageTag = document.getElementById("ageTag");
    const agePill = document.getElementById("agePill");
    const storyTitle = document.getElementById("storyTitle");
    const description = document.getElementById("description");
    const choices = document.getElementById("choices");
    const roundLabel = document.getElementById("roundLabel");
    const progressBar = document.getElementById("progressBar");
    const traitsNode = document.getElementById("traits");
    const lastChoice = document.getElementById("lastChoice");
    const endingActions = document.getElementById("endingActions");
    const historyNode = document.getElementById("history");
    const gameTitle = document.getElementById("gameTitle");
    const homeScreen = document.getElementById("homeScreen");
    const homeTitle = document.getElementById("homeTitle");
    const homeDescription = document.getElementById("homeDescription");
    const imageExtensions = [".jpg", ".jpeg", ".png", ".webp", ".gif", ".avif", ".svg"];
    let imageFallbackQueue = [];

    gameTitle.textContent = data.title || "Y6 的长线选择";
    document.title = gameTitle.textContent;
    homeTitle.textContent = data.home?.title || data.title || "Y6 的长线选择";
    homeDescription.textContent = data.home?.description || "";

    document.getElementById("startButton").addEventListener("click", startGame);
    document.getElementById("restartButton").addEventListener("click", restart);
    document.getElementById("homeButton").addEventListener("click", goHome);
    document.getElementById("shareButton").addEventListener("click", copySummary);
    sceneImage.addEventListener("error", () => {
      const nextImage = imageFallbackQueue.shift();
      if (nextImage) {
        sceneImage.src = nextImage;
        return;
      }

      if (!sceneImage.src.endsWith("/scenes/images/default.svg")) {
        sceneImage.src = "scenes/images/default.svg";
      }
    });

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function activeRound(index = roundIndex) {
      const round = data.rounds[index];
      const variant = previousBranch && round.variants ? round.variants[previousBranch] : null;
      return {
        ...round,
        ...(variant || {}),
        options: variant?.options || round.options || []
      };
    }

    function makeRoundScene(round) {
      return {
        title: round.title,
        description: round.description,
        age: round.age,
        image: round.image
      };
    }

    function imageCandidates(path) {
      const source = path || "scenes/images/default.svg";
      const queryIndex = source.search(/[?#]/);
      const cleanSource = queryIndex >= 0 ? source.slice(0, queryIndex) : source;
      const suffix = queryIndex >= 0 ? source.slice(queryIndex) : "";
      const dotIndex = cleanSource.lastIndexOf(".");
      const slashIndex = Math.max(cleanSource.lastIndexOf("/"), cleanSource.lastIndexOf("\\"));
      const hasExtension = dotIndex > slashIndex;
      const base = hasExtension ? cleanSource.slice(0, dotIndex) : cleanSource;
      const currentExtension = hasExtension ? cleanSource.slice(dotIndex).toLowerCase() : "";
      const variants = [source];

      imageExtensions.forEach(extension => {
        if (extension !== currentExtension) {
          variants.push(`${base}${extension}${suffix}`);
        }
      });

      return [...new Set(variants)];
    }

    function setSceneImage(path) {
      const candidates = imageCandidates(path);
      imageFallbackQueue = candidates.slice(1);
      sceneImage.src = candidates[0];
    }

    function addEffects(effects) {
      Object.entries(effects || {}).forEach(([key, value]) => {
        traits[key] = clamp((traits[key] || 0) + value, 0, maxTrait);
      });
    }

    function optionVisible(option) {
      return !option.showIf || testEnding(option.showIf, traits);
    }

    function availableOptions(round = activeRound()) {
      const visible = (round.options || []).filter(optionVisible);
      return visible.length ? visible : (round.options || []);
    }

    function resetGameState() {
      Object.keys(traits).forEach(key => {
        traits[key] = 0;
      });
      roundIndex = 0;
      history = [];
      finalEnding = null;
      previousBranch = null;
      currentScene = makeRoundScene(activeRound());
    }

    function startGame() {
      screen = "game";
      resetGameState();
      render();
    }

    function goHome() {
      screen = "home";
      resetGameState();
      render();
    }

    function choose(option, optionIndex) {
      const round = activeRound();
      addEffects(option.effects);
      history.push({
        age: round.age,
        title: option.title,
        text: option.text,
        scene: option.scene,
        branch: option.branch
      });

      previousBranch = option.branch || previousBranch || String(optionIndex);
      roundIndex += 1;

      if (roundIndex >= data.rounds.length) {
        finalEnding = data.endings.find(ending => testEnding(ending.test, traits)) || data.endings[data.endings.length - 1];
        currentScene = {
          title: finalEnding.title,
          description: finalEnding.description,
          age: "结局",
          image: finalEnding.image
        };
      } else {
        const next = activeRound();
        currentScene = {
          title: next.title,
          description: `${option.scene} ${next.description}`,
          age: next.age,
          image: option.resultImage || next.image,
          choiceIndex: optionIndex
        };
      }

      render();
    }

    function testEnding(test, score) {
      if (!test) {
        return true;
      }

      const usesDetailedRules = test.min || test.max || test.any || test.not;
      const minRules = test.min || (usesDetailedRules ? {} : test);
      const maxRules = test.max || {};
      const minPassed = Object.entries(minRules).every(([key, value]) => (score[key] || 0) >= value);
      const maxPassed = Object.entries(maxRules).every(([key, value]) => (score[key] || 0) <= value);
      const anyPassed = !test.any || test.any.some(rule => testEnding(rule, score));
      const notPassed = !test.not || !testEnding(test.not, score);

      return minPassed && maxPassed && anyPassed && notPassed;
    }

    function restart() {
      screen = "game";
      resetGameState();
      render();
    }

    async function copySummary() {
      const summary = [
        data.title || "Y6 的长线选择",
        ...history.map(item => `${item.age}: ${item.title} - ${item.text}`),
        finalEnding ? finalEnding.title : ""
      ].filter(Boolean).join("\n");

      try {
        await navigator.clipboard.writeText(summary);
        setShareText("已复制");
      } catch (error) {
        setShareText("复制失败");
      }
    }

    function setShareText(text) {
      const shareButton = document.getElementById("shareButton");
      shareButton.textContent = text;
      setTimeout(() => {
        shareButton.textContent = "复制人生摘要";
      }, 1200);
    }

    function renderTraits() {
      traitsNode.innerHTML = "";
      Object.entries(data.traitLabels).forEach(([key, label]) => {
        const row = document.createElement("div");
        row.className = "trait";
        row.innerHTML = `
          <span>${label}</span>
          <span class="trait-track"><span style="width: ${(traits[key] / maxTrait) * 100}%"></span></span>
          <span>${traits[key]}</span>
        `;
        traitsNode.appendChild(row);
      });
    }

    function renderChoices() {
      choices.innerHTML = "";

      if (finalEnding) {
        choices.hidden = true;
        endingActions.hidden = false;
        historyNode.hidden = false;
        historyNode.innerHTML = history.map(item => `<div><strong>${item.age}</strong>：${item.title}<br>${item.scene}</div>`).join("");
        return;
      }

      choices.hidden = false;
      endingActions.hidden = true;
      historyNode.hidden = true;

      availableOptions().forEach((option, index) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "choice";
        button.innerHTML = `<strong>${index + 1}. ${option.title}</strong><span>${option.text}</span>`;
        button.addEventListener("click", () => choose(option, index));
        choices.appendChild(button);
      });
    }

    function render() {
      homeScreen.hidden = screen !== "home";
      document.body.classList.toggle("is-home", screen === "home");

      if (screen === "home") {
        setSceneImage(data.home?.image || "scenes/images/home.svg");
        sceneImage.alt = data.home?.title || data.title || "游戏首页背景";
        renderTraits();
        choices.hidden = true;
        endingActions.hidden = true;
        historyNode.hidden = true;
        lastChoice.hidden = true;
        return;
      }

      storyTitle.textContent = currentScene.title;
      description.textContent = currentScene.description;
      ageTag.textContent = currentScene.age;
      agePill.textContent = currentScene.age;
      setSceneImage(currentScene.image);
      sceneImage.alt = `${currentScene.age}：${currentScene.title}`;

      const shownRound = finalEnding ? data.rounds.length : roundIndex + 1;
      roundLabel.textContent = finalEnding ? "已抵达结局" : `第 ${shownRound} / ${data.rounds.length} 轮`;
      progressBar.style.width = `${(shownRound / data.rounds.length) * 100}%`;

      if (history.length && !finalEnding) {
        const item = history[history.length - 1];
        lastChoice.hidden = false;
        lastChoice.textContent = `上一选择：${item.title}。${item.scene}`;
      } else {
        lastChoice.hidden = true;
      }

      renderTraits();
      renderChoices();
    }

    render();
  </script>
</body>
</html>
